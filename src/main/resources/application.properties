spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

spring.application.name=${SPRING_APPLICATION_NAME:moneymanager}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/api/v1.0}

# Cloud database configuration
supabase.datasource.url=${POSTGRES_SUPABASE_URL:}
supabase.datasource.username=${POSTGRES_SUPABASE_USERNAME:}
supabase.datasource.password=${POSTGRES_SUPABASE_PASSWORD:}
supabase.datasource.driver-class-name=${SUPABASE_DATASOURCE_DRIVER:org.postgresql.Driver}

# Local fallback database configuration
local.datasource.url=${LOCAL_MYSQL_DATASOURCE_URL:}
local.datasource.username=${LOCAL_MYSQL_DATASOURCE_USERNAME:}
local.datasource.password=${LOCAL_MYSQL_DATASOURCE_PASSWORD:}
local.datasource.driver-class-name=${LOCAL_MYSQL_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA and Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
spring.jpa.open-in-view=false

# Email configuration
spring.mail.host=${SPRING_MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.protocol=${SPRING_MAIL_PROTOCOL:smtp}
spring.mail.username=${BREVO_USERNAME:}
spring.mail.password=${BREVO_PASSWORD:}
spring.mail.properties.mail.smtp.from=${BREVO_FROM_EMAIL:}

money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL:http://localhost:5173}
app.backend.url=${MONEY_MANAGER_BACKEND_URL:http://localhost:8080}

# Swagger/OpenAPI configuration
springdoc.api-docs.path=${SPRINGDOC_API_DOCS_PATH:/v3/api-docs}
springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}
